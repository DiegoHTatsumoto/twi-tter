{% extends 'base.html' %}

{% block title %}Login - Twi-tter{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="font-heading text-5xl font-bold text-brand-900 mb-3">Twi-tter</h1>
            <p class="text-lg text-gray-600">Conecte-se com pessoas ao redor do mundo</p>
        </div>
        
        <div class="bg-white border border-gray-100 rounded-3xl p-8 shadow-sm">
            <h2 class="text-2xl font-semibold text-gray-900 mb-6">Entrar na sua conta</h2>
            
            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                
                <div class="mb-6">
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Nome de usuário</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        required
                        class="w-full rounded-xl border-gray-200 bg-gray-50 px-4 py-3 text-gray-900 focus:border-brand-900 focus:ring-brand-900 focus:bg-white transition-all outline-none"
                        placeholder="seunome"
                        data-testid="login-username-input"
                    >
                </div>
                
                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required
                        class="w-full rounded-xl border-gray-200 bg-gray-50 px-4 py-3 text-gray-900 focus:border-brand-900 focus:ring-brand-900 focus:bg-white transition-all outline-none"
                        placeholder="••••••••"
                        data-testid="login-password-input"
                    >
                </div>
                
                <button 
                    type="submit" 
                    class="w-full bg-brand-900 text-white hover:bg-black rounded-full px-6 py-3 font-medium transition-transform active:scale-95 shadow-sm"
                    data-testid="login-submit-button"
                >
                    Entrar
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-gray-600">
                    Não tem uma conta? 
                    <a href="{% url 'register' %}" class="text-accent hover:text-accent-hover font-semibold" data-testid="register-link">Criar conta</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
